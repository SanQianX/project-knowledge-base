<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" role="img" aria-label="project-knowledge logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1118"/>
      <stop offset="1" stop-color="#141c26"/>
    </linearGradient>
    <linearGradient id="core" x1="80" y1="40" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dff8ff"/>
      <stop offset=".55" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#2f7d64"/>
    </linearGradient>
    <linearGradient id="book" x1="78" y1="92" x2="148" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#b8c6d8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>
  <rect width="560" height="160" rx="18" fill="url(#bg)"/>
  <!-- Logo mark -->
  <g transform="translate(36,28)">
    <!-- Glow halo -->
    <circle cx="60" cy="52" r="42" fill="#7492a5" opacity="0.18" filter="url(#glow)"/>
    <!-- Book base -->
    <path d="M22 78 L98 78 L98 118 Q60 110 22 118 Z" fill="url(#book)" opacity="0.92"/>
    <path d="M60 84 L60 116" stroke="#7492a5" stroke-width="1.2" opacity="0.55"/>
    <!-- Core orb -->
    <circle cx="60" cy="52" r="26" fill="url(#core)"/>
    <!-- Orbiting nodes -->
    <circle cx="60" cy="14" r="4.5" fill="#7dd3fc"/>
    <circle cx="100" cy="36" r="4.5" fill="#75b798"/>
    <circle cx="100" cy="68" r="4.5" fill="#c5a15d"/>
    <circle cx="20" cy="36" r="4.5" fill="#60a5fa"/>
    <circle cx="20" cy="68" r="4.5" fill="#d36d6d"/>
    <!-- Connectors -->
    <g stroke="#7492a5" stroke-width="1.1" opacity="0.55" fill="none">
      <line x1="60" y1="14" x2="60" y2="26"/>
      <line x1="100" y1="36" x2="84" y2="46"/>
      <line x1="100" y1="68" x2="84" y2="58"/>
      <line x1="20" y1="36" x2="36" y2="46"/>
      <line x1="20" y1="68" x2="36" y2="58"/>
    </g>
  </g>
  <!-- Wordmark -->
  <g transform="translate(184,52)" fill="#e3ebf5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="0" y="28" font-size="34" font-weight="700" letter-spacing="-0.5">project-knowledge</text>
    <text x="2" y="58" font-size="15" font-weight="500" fill="#7492a5" letter-spacing="0.5">Local KB · Git-aware · AI-reviewed</text>
  </g>
</svg>