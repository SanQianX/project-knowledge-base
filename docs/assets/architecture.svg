<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-label="Architecture">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2330"/>
      <stop offset="1" stop-color="#141c26"/>
    </linearGradient>
    <linearGradient id="cardHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2a3a"/>
      <stop offset="1" stop-color="#192331"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7492a5"/>
    </marker>
  </defs>

  <rect width="1180" height="620" fill="#0c1118"/>

  <!-- Title -->
  <text x="590" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600" fill="#e3ebf5" letter-spacing="-0.2">How project-knowledge works</text>
  <text x="590" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" fill="#94a3b8">Local-first pipeline · every byte stays under your home directory</text>

  <!-- Layer labels -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="9.5" fill="#64748b" letter-spacing="1.5" font-weight="600">
    <text x="28" y="150">USER · UI</text>
    <text x="28" y="282">SERVER</text>
    <text x="28" y="438">DATA · GIT</text>
    <text x="28" y="582">EXTERNAL</text>
  </g>

  <!-- Layer 1: User-facing -->
  <g transform="translate(120,86)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g>
      <rect width="252" height="116" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Browser Dashboard</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">127.0.0.1:5757</text>
      <g font-size="10.5" fill="#94a3b8">
        <text x="16" y="60">· Project sidebar</text>
        <text x="16" y="76">· Supervision cards</text>
        <text x="16" y="92">· Runs / Drafts review</text>
        <text x="16" y="108">· Claude workbench</text>
      </g>
    </g>

    <g transform="translate(264,0)">
      <rect width="252" height="116" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">CLI daemon</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">start · stop · status · --fg</text>
      <g font-size="10.5" fill="#94a3b8">
        <text x="16" y="60">· Port fallback 5757–5776</text>
        <text x="16" y="76">· PID file in os.tmpdir()</text>
        <text x="16" y="92">· Auto-open browser</text>
        <text x="16" y="108">· Survives terminal close</text>
      </g>
    </g>

    <g transform="translate(528,0)">
      <rect width="252" height="116" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Post-commit hook</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">.git/hooks/post-commit</text>
      <g font-size="10.5" fill="#94a3b8">
        <text x="16" y="60">· Fires on git commit</text>
        <text x="16" y="76">· Triggers scan + analysis</text>
        <text x="16" y="92">· Injects KB reading rule</text>
        <text x="16" y="108">  into project's CLAUDE.md</text>
      </g>
    </g>

    <g transform="translate(792,0)">
      <rect width="252" height="116" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Claude Code / agents</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">reads KB indexes first</text>
      <g font-size="10.5" fill="#94a3b8">
        <text x="16" y="60">· Reads GOAL.md</text>
        <text x="16" y="76">· Reads modules/00-index.md</text>
        <text x="16" y="92">· Reads changes/00-index.md</text>
        <text x="16" y="108">· Opens only top-matched files</text>
      </g>
    </g>
  </g>

  <!-- Layer 2: Server -->
  <g transform="translate(120,220)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="1044" height="124" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
    <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Local HTTP server · Node.js · 127.0.0.1 only</text>

    <g font-size="10">
      <g transform="translate(16,40)">
        <rect width="148" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="74" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">scanner.js</text>
        <text x="74" y="26" font-size="9" fill="#64748b" text-anchor="middle">git state walker</text>
      </g>
      <g transform="translate(176,40)">
        <rect width="170" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="85" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">analysis-orchestrator</text>
        <text x="85" y="26" font-size="9" fill="#64748b" text-anchor="middle">commit / initial</text>
      </g>
      <g transform="translate(358,40)">
        <rect width="160" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="80" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">context-pack-builder</text>
        <text x="80" y="26" font-size="9" fill="#64748b" text-anchor="middle">prompt assembly</text>
      </g>
      <g transform="translate(530,40)">
        <rect width="132" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="66" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">kb-framework</text>
        <text x="66" y="26" font-size="9" fill="#64748b" text-anchor="middle">layout / validate</text>
      </g>
      <g transform="translate(674,40)">
        <rect width="120" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="60" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">draft-apply</text>
        <text x="60" y="26" font-size="9" fill="#64748b" text-anchor="middle">review / merge</text>
      </g>
      <g transform="translate(806,40)">
        <rect width="222" height="32" rx="6" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.25)"/>
        <text x="111" y="14" font-size="10.5" fill="#7dd3fc" text-anchor="middle" font-weight="600">github-team-store</text>
        <text x="111" y="26" font-size="9" fill="#64748b" text-anchor="middle">Gitea OAuth · sparse checkout</text>
      </g>
    </g>
    <text x="16" y="100" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#64748b">REST + WebSocket on a single port · SPA shell from _site/index.html</text>
  </g>

  <!-- Layer 3: Data + git -->
  <g transform="translate(120,376)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g>
      <rect width="252" height="124" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">~/.project-knowledge/</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">or $KB_DATA_DIR</text>
      <g font-size="10.5" font-family="ui-monospace, Consolas, monospace" fill="#94a3b8">
        <text x="16" y="62">projects.json</text>
        <text x="16" y="78">ai-profiles.json</text>
        <text x="16" y="94">knowledge-store.json</text>
        <text x="16" y="110">logs/  ·  _ai/  ·  projects/</text>
      </g>
    </g>
    <g transform="translate(264,0)">
      <rect width="252" height="124" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Your Git projects</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">local paths · local repos</text>
      <g font-size="10.5" font-family="ui-monospace, Consolas, monospace" fill="#94a3b8">
        <text x="16" y="62">git status / log / branch</text>
        <text x="16" y="78">HEAD metadata</text>
        <text x="16" y="94">.git/hooks/post-commit</text>
        <text x="16" y="110">CLAUDE.md (managed block)</text>
      </g>
    </g>
    <g transform="translate(528,0)">
      <rect width="636" height="124" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" font-size="12" font-weight="600" fill="#cbd5e1">Generated knowledge base (per project)</text>
      <text x="16" y="38" font-size="10" fill="#64748b" font-family="ui-monospace, Consolas, monospace">bilingual · module + change docs · reviewed drafts only</text>
      <g font-size="10.5" font-family="ui-monospace, Consolas, monospace" fill="#94a3b8">
        <text x="16" y="62">  &lt;kbPath&gt;/GOAL.md</text>
        <text x="16" y="78">  modules/00-index.md  ·  changes/00-index.md</text>
        <text x="16" y="94">  modules/&lt;area&gt;.md  ·  changes/release-v*.md</text>
        <text x="16" y="110">  drafts/&lt;pending&gt;.md  (reviewable before apply)</text>
      </g>
    </g>
  </g>

  <!-- Layer 4: External -->
  <g transform="translate(120,520)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect width="1044" height="44" rx="9" fill="url(#card)" stroke="rgba(255,255,255,0.08)"/>
    <text x="16" y="20" font-size="12" font-weight="600" fill="#cbd5e1">Anthropic-compatible LLM API</text>
    <text x="200" y="20" font-size="10.5" fill="#94a3b8" font-family="ui-monospace, Consolas, monospace">Claude · GLM · DeepSeek · Kimi · self-hosted — any provider exposing the Anthropic Messages API shape</text>
    <text x="200" y="36" font-size="9.5" fill="#64748b">Keys stored locally in ai-profiles.json · never leave your machine except in the request body itself</text>
  </g>

  <!-- Connectors -->
  <g stroke="#7492a5" stroke-width="1.2" fill="none" marker-end="url(#arrow)" opacity="0.55">
    <!-- User -> Server -->
    <line x1="246" y1="202" x2="246" y2="216"/>
    <line x1="510" y1="202" x2="510" y2="216"/>
    <line x1="774" y1="202" x2="774" y2="216"/>
    <!-- Server -> Data -->
    <line x1="246" y1="344" x2="246" y2="372"/>
    <line x1="510" y1="344" x2="510" y2="372"/>
    <line x1="774" y1="344" x2="774" y2="372"/>
    <!-- Server -> External -->
    <line x1="640" y1="344" x2="640" y2="516"/>
    <!-- User agents <-> Server (read KB) -->
    <line x1="918" y1="202" x2="918" y2="216"/>
    <line x1="918" y1="468" x2="918" y2="496" stroke-dasharray="3,3" opacity="0.4"/>
  </g>
</svg>