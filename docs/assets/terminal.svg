<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="CLI startup">
  <defs>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0f15"/>
      <stop offset="1" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c2632"/>
      <stop offset="1" stop-color="#161e29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7492a5" stop-opacity="0"/>
      <stop offset=".5" stop-color="#7492a5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7492a5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Window -->
  <rect width="1100" height="520" rx="13" fill="url(#term)" stroke="rgba(255,255,255,0.08)"/>

  <!-- Title bar -->
  <rect width="1100" height="40" rx="13" fill="url(#titlebar)"/>
  <rect y="26" width="1100" height="14" fill="url(#titlebar)"/>
  <line y1="40" x2="1100" y2="40" stroke="rgba(255,255,255,0.06)"/>

  <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6" fill="#febc2e"/>
  <circle cx="62" cy="20" r="6" fill="#28c840"/>

  <text x="550" y="25" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#64748b" text-anchor="middle">PowerShell — project-knowledge</text>

  <!-- Terminal body -->
  <g font-family="ui-monospace, 'JetBrains Mono', Consolas, monospace" font-size="13.5">
    <!-- Install -->
    <text x="28" y="84" fill="#475569">PS C:\Users\SanQian&gt;</text>
    <text x="248" y="84" fill="#e3ebf5"> npm install -g project-knowledge</text>

    <text x="28" y="108" fill="#64748b">added 1 package in 4s</text>

    <!-- Start -->
    <text x="28" y="148" fill="#475569">PS C:\Users\SanQian&gt;</text>
    <text x="248" y="148" fill="#e3ebf5"> project-knowledge</text>

    <!-- Banner -->
    <g transform="translate(28,170)">
      <rect width="500" height="76" rx="6" fill="rgba(116,146,165,0.04)" stroke="rgba(116,146,165,0.15)"/>
      <text x="14" y="20" font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="2">PROJECT-KNOWLEDGE</text>
      <text x="14" y="38" font-size="13" font-weight="600" fill="#e3ebf5">Local knowledge-base dashboard</text>
      <text x="14" y="56" font-size="11" fill="#7492a5" font-family="ui-monospace, Consolas, monospace">v3.0.14  ·  node v22.x  ·  Apache-2.0</text>
    </g>

    <!-- Init logs -->
    <g font-size="12.5" fill="#94a3b8">
      <text x="28" y="278"> ▸ Resolving data directory …</text>
      <text x="240" y="278" fill="#75b798" font-family="ui-monospace, Consolas, monospace">~/.project-knowledge/</text>

      <text x="28" y="302"> ▸ Migrating legacy state (1.x → 3.x) …</text>
      <text x="316" y="302" fill="#8794a6">no legacy data found</text>

      <text x="28" y="326"> ▸ Loading AI profiles …</text>
      <text x="220" y="326" fill="#75b798">3 profiles  ·  default: claude-opus-4-7</text>

      <text x="28" y="350"> ▸ Starting HTTP server on 127.0.0.1:5757 …</text>
      <text x="408" y="350" fill="#75b798">listening</text>

      <text x="28" y="374"> ▸ Watching 4 projects · 12 pending commits · 1 active run</text>

      <text x="28" y="398"> ▸ Opening dashboard in browser …</text>
    </g>

    <!-- Final URL block -->
    <g transform="translate(28,418)">
      <rect width="540" height="68" rx="6" fill="rgba(116,146,165,0.06)" stroke="rgba(116,146,165,0.2)"/>
      <text x="14" y="20" font-size="10.5" fill="#64748b" letter-spacing="2" font-weight="600">DASHBOARD READY</text>
      <text x="14" y="42" font-size="15" font-weight="600" fill="#7dd3fc">→  http://127.0.0.1:5757</text>
      <text x="14" y="60" font-size="11" fill="#94a3b8">Ctrl+C in this window, or run <tspan fill="#e3ebf5" font-weight="600">project-knowledge stop</tspan> elsewhere.</text>
    </g>

    <!-- Cursor -->
    <rect x="28" y="494" width="9" height="16" fill="#e3ebf5">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>