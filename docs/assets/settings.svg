<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Settings drawer">
  <defs>
    <linearGradient id="page3" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1118"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="drawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161e29"/>
      <stop offset="1" stop-color="#121923"/>
    </linearGradient>
    <linearGradient id="backdrop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#page3)"/>

  <!-- Faded dashboard behind -->
  <rect width="1280" height="800" fill="url(#backdrop)"/>

  <!-- Faint sidebar + main content suggestion -->
  <rect width="290" height="800" fill="#070b10" opacity="0.5"/>
  <rect x="290" width="1" height="800" fill="rgba(255,255,255,0.04)" opacity="0.5"/>

